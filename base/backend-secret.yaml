# This is a TEMPLATE, not a real secret — every value below is a placeholder.
# It is intentionally committed so the required keys are documented and
# `kustomize build` succeeds out of the box, but it must be replaced before
# any real deployment. See docs/SECRETS.md for the two supported approaches
# (manual kubectl apply of a real Secret per-cluster, or Sealed Secrets).
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: ai-task-platform
  annotations:
    ai-task-platform.io/managed-by: "manual — see docs/SECRETS.md"
type: Opaque
stringData:
  JWT_ACCESS_SECRET: "CHANGE_ME_generate_with_openssl_rand_hex_48"
  JWT_REFRESH_SECRET: "CHANGE_ME_generate_a_different_value_with_openssl_rand_hex_48"
  MONGO_URI_OVERRIDE: "" # leave empty unless overriding the ConfigMap MONGO_URI with credentials
