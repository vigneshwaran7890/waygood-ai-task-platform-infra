# Placeholder values — see docs/SECRETS.md. In practice this file's
# stringData is replaced with real staging secrets via a sealed-secret or a
# manually-applied Secret that is NEVER committed; this patch only documents
# the required keys so `kustomize build` succeeds without external state.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
stringData:
  JWT_ACCESS_SECRET: "CHANGE_ME_staging_access_secret"
  JWT_REFRESH_SECRET: "CHANGE_ME_staging_refresh_secret"
