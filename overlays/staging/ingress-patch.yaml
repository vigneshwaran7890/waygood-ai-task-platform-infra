apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-task-platform
spec:
  rules:
    - host: staging.ai-task-platform.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  name: http
  tls:
    - hosts:
        - staging.ai-task-platform.example.com
      secretName: ai-task-platform-staging-tls
